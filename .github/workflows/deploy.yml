name: Deploy to Railway

on:
  push:
    branches: [main]

# Railway automatically detects pushes to connected GitHub repos and deploys.
# No RAILWAY_TOKEN needed — Railway's GitHub App handles everything.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Railway is connected via GitHub Sync — deployment triggered automatically"
