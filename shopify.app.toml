# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "6a46ae39d0d439b1f3830ef534955fb5"
name = "AfterFlow AI - Auto Order Tags"
application_url = "https://afterflow-ai-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

  # GDPR compliance — required for App Store approval
  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  uri = "/webhooks"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_orders,write_orders"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://afterflow-ai-production.up.railway.app/auth/callback",
  "https://afterflow-ai-production.up.railway.app/auth/shopify/callback",
  "https://afterflow-ai-production.up.railway.app/api/auth",
  "https://afterflow-ai-production.up.railway.app/privacy"
]
